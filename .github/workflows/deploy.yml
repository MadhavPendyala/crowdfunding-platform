name: Continuous Delivery Production Engine Workflow

on:
  push:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Fetch Target Code State
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

  package-and-deploy:
    needs: validate-and-test
    runs-on: ubuntu-22.04
    steps:
      - name: Fetch Target Code State
        uses: actions/checkout@v4

      - name: Authenticate Container Registry Access
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Optimized Production Container Image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/cf-backend:latest -f src-backend-core/Dockerfile src-backend-core/

      - name: Push Verified Image to Docker Hub Registry
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cf-backend:latest

      - name: Remote Execute Rollout on Cloud VM Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo apt-get update -y
            sudo apt-get install -y docker.io
            sudo systemctl start docker
            sudo docker stop cf-backend || true
            sudo docker rm cf-backend || true
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/cf-backend:latest
            sudo docker run -d --name cf-backend --restart always -p 80:5000 ${{ secrets.DOCKER_HUB_USERNAME }}/cf-backend:latest
